# --- Section 201 (Trade Act §201 safeguard) ---
# Currently models the Solar 201 program (9903.45.21–.29). The HTS `general`
# field shows the original Year-1 (2018) out-of-quota rate (30%) which doesn't
# reflect the annual step-down published by USTR. Override here with the
# current effective rate.
#   - 2025-02-07 → 2026-02-07 (Year 8 of extension): 14.5% on out-of-quota
#   - update annually based on USTR notice
section_201:
  solar_rate: 0.145

# --- Authority classification ranges (9903.xx) ---
authority_ranges:
  section_232:      [80, 81, 82, 83, 84, 85, 94, 74, 76, 78]
  section_301:      [86, 87, 88, 89, 91, 92]
  ieepa_reciprocal: [90, 93, 95, 96]  # Legacy ranges only; Phase 1/2 use ieepa_phase1_range/ieepa_phase2_range
  section_201:      [40, 41, 42, 43, 44, 45]
  ieepa_fentanyl_range:
    start: '9903.01.01'
    end:   '9903.01.24'
  ieepa_phase1_range:
    start: '9903.01.43'
    end:   '9903.01.75'
  ieepa_phase2_range:
    start: '9903.02.02'
    end:   '9903.02.91'   # Extended from .81 to .91 to cover Swiss/Liechtenstein framework entries

# --- Section 232 covered product prefixes ---
# Prefix matching: '72' matches all HTS10 starting with 72, '8703' matches 8703xxxx, etc.
# Products are also captured via footnote mechanism; this is the blanket backup.
section_232_chapters:
  steel: ['72', '73']
  aluminum: ['76']
  copper: ['74']   # per-type metal-chapter map (single source of truth; Plank 5a).
                   # Distinct from metal_content.primary_chapters below (which excludes 74
                   # because copper heading products are scaled by copper_share, not full-metal).

# Additional 232 tariffs beyond steel/aluminum (9903.94 auto tariffs, copper, etc.)
# These use HTS heading/subheading prefixes rather than full chapter coverage.
section_232_headings:
  autos_passenger:
    prefixes: ['870322', '870323', '870324', '870331', '870332', '870333',
               '870334', '870340', '870350', '870360', '870370', '870380', '870390']
    default_rate: 0.25
    usmca_exempt: true
  autos_light_trucks:
    prefixes: ['87042101', '87043101', '87044100', '87045100']
    default_rate: 0.25
    usmca_exempt: true
  copper:
    products_file: 'resources/s232_copper_products.csv'  # Authoritative: US Note 36(b), 80 HTS8 prefixes
    prefixes: ['7406', '7407', '7408', '7409', '7410', '7411', '7412', '7413',
               '7415', '7418', '7419', '8544']  # Fallback if products_file missing
    default_rate: 0.50    # 9903.78.01: 50% upon value of copper content (June 2025 proclamation)
    usmca_exempt: false
  softwood:
    prefixes: ['44031100', '44032101', '44032201', '44032301', '44032401',
               '44032501', '44032601', '44039901', '44061100', '44069100',
               '44071100', '44071200', '44071300', '44071400', '44071900']
    default_rate: 0.10
    usmca_exempt: false
  wood_furniture:
    prefixes: ['9401614011', '9401614031', '9401616011', '9401616031']
    default_rate: 0.25
    usmca_exempt: false
  kitchen_cabinets:
    prefixes: ['9403409060', '9403608093', '9403910080']
    default_rate: 0.25
    usmca_exempt: false
  mhd_vehicles:
    prefixes: ['87012100', '87012200', '87012300', '87012400', '87012900',
               '87041010', '87041050', '87042211', '87042251', '87042301',
               '87043201', '87044200', '87044300', '87045200', '87046000',
               '87049001', '87054000', '8705900080', '87060003', '8706000520',
               '8706000575', '87060025', '87060050', '87091100', '87091900']
    default_rate: 0.25
    usmca_exempt: true
  auto_parts:
    prefixes_file: 'resources/s232_auto_parts.txt'
    # Note 33(g) names some dual-use provisions (bare 8471) whose trade is
    # mostly not vehicle parts; shares scope the duty to the in-scope fraction.
    applicability_shares_file: 'resources/s232_auto_parts_applicability.csv'
    default_rate: 0.25
    usmca_exempt: true
  mhd_parts:
    prefixes_file: 'resources/s232_mhd_parts.txt'
    default_rate: 0.25
    usmca_exempt: true
  buses:
    prefixes: ['8702']
    default_rate: 0.10
    usmca_exempt: false
  # 9903.79.01 (Note 39, effective 2026-01-16). Note 39 has no USMCA carve-out —
  # all countries owe the 25% on qualifying articles. Subdivision (c) routes
  # imports under the three HTS headings that fail the TPP/DRAM tech gate
  # through 9903.79.02 (no additional duty); qualifying_shares_file models that
  # blend at the HTS10 level. Subdivisions (d)(i)–(vii) are end-use exemptions
  # (data centers, R&D, startups, etc.) modeled via end_use_exemption_share.
  # Stacking exclusions per Note 39(a) + Note 2(v)(xvi) are applied in
  # apply_stacking_rules() based on the `is_semi` flag, not here.
  semiconductors:
    products_file: 'resources/s232_semi_products.csv'
    qualifying_shares_file: 'resources/semi_qualifying_shares.csv'
    prefixes: ['847150', '847180', '847330']  # fallback
    default_rate: 0.25
    usmca_exempt: false
    end_use_exemption_share: 0.0   # uncalibrated, see todo.md Phase 5
  # Pharmaceuticals (chapter 30) — DORMANT 232 sub-program (register-then-activate).
  # No Ch99 backing in baseline => extract_section232_rates sets pharma_rate = 0 and
  # compute_heading_gates gates this OFF, so the heading loop skips it => byte-
  # identical to golden. A scenario activates it via
  # set_rate(section_232, program='pharmaceuticals', rate=X). usmca_exempt: true
  # routes it through the generic s232_usmca_eligible path (full (1 - usmca_share)
  # scaling; ch30 isn't auto/MHD). Reciprocal/s122 displacement rides the normal
  # rate_232 nonmetal_share machinery — verified by the check_pharma fixture (ch30
  # metal content must resolve nonmetal_share = 0; if it leaks, give pharma an
  # explicit full-value entry per docs/counterfactual_generality_ground_truth.md).
  pharmaceuticals:
    products_file: 'resources/s232_pharma_products.csv'
    prefixes: ['30']  # fallback only if the Annex I resource is unavailable
    # Tariff-ETRs current-law treatment (2026-04-06 scenario, Sept. 29 layer):
    # a tiny default rate activates the heading; target_total below supplies the
    # effective 100%/15% floors, while the UK uses an MFN + 10% surcharge.
    # effective_date DATE-GATES the activation (extract_section232_rates, 05): the
    # heading turns on for every revision >= this date, including empty-ops boundary
    # mints — so it does NOT need (and must NOT use) a scheduled_activation op, which
    # would silently drop at the next bnd_ mint. Paired with boundary_overrides below.
    effective_date: '2026-09-29'
    default_rate: 0.0001
    country_rates:
      CTY_UK: 0.10
    target_total:
      default: 1.00
      CTY_JAPAN: 0.15
      eu: 0.15
      CTY_SKOREA: 0.15
      CTY_SWITZERLAND: 0.15
      CTY_LIECHTENSTEIN: 0.15
      CTY_UK: 0
    generic_share:
      CTY_CHINA: 0.95
      '5330': 0.95
      default: 0.20
    exempt_share:
      eu: 0.75
      CTY_UK: 0.75
      CTY_JAPAN: 0.75
      default: 0.40
      '4190': 0.95
      CTY_SWITZERLAND: 0.95
      '4231': 0.95
    usmca_exempt: false

# --- Section 232 country exemptions (pre-March 2025) ---
# TRQ/quota agreements and full exemptions from Proclamations 9705/9704.
# These are NOT encoded in the HTS JSON — the tariff schedule shows "all countries"
# for steel and "all except [6]" for aluminum, but trade agreements separately
# exempted major partners. Revoked by Proclamation 10896, effective 2025-03-12.
# Modeled as rate = 0 for these countries (binary, matching Tariff-ETRs approach).
# Russia gets 200% on aluminum per 2023 Proclamation 10522 (not date-bounded — still active).
#
# applies_to: which 232 programs this exemption covers
# expiry_date: when the exemption was revoked (null = still active)
section_232_country_exemptions:
  # Canada and Mexico: USMCA-related exemption
  - countries: ['1220', '2010']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # EU-27: TRQ agreement
  - countries: 'eu'
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # UK: TRQ agreement
  - countries: ['4120']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # Japan: TRQ agreement
  - countries: ['5880']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # South Korea: Quota agreement
  - countries: ['5800']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # Australia: Full exemption
  - countries: ['6021']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # Brazil: Quota agreement
  - countries: ['3510']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # Argentina: Quota agreement
  - countries: ['3570']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # Ukraine: Exemption
  - countries: ['4623']
    rate: 0
    applies_to: ['steel', 'aluminum']
    expiry_date: '2025-03-12'
  # Russia: 200% on aluminum per 2023 Proclamation 10522 (permanent override)
  - countries: ['4621']
    rate: 2.0
    applies_to: ['aluminum']
    expiry_date: null

# --- Section 232 annex restructuring (April 2026 proclamation) ---
# Effective 2026-04-06: single-rate regime replaced by four product annexes.
# Pre-April-6 revisions ignore this block entirely (date-gated in 06_calculate_rates.R).
section_232_annexes:
  effective_date: '2026-04-06'
  resource_file: 'resources/s232_annex_products.csv'
  annexes:
    annex_1a:
      label: 'Core metals + close derivatives'
      rate: 0.50
      chapters: ['72', '73', '76', '74']
      uk_rate: 0.25
      uk_applies_to: ['steel', 'aluminum']  # not copper
    annex_1b:
      label: 'Downstream manufactured articles'
      rate: 0.25
      uk_rate: 0.15
      uk_applies_to: ['steel', 'aluminum']
    annex_1c:
      label: 'Mobile industrial equipment and machinery (temporary)'
      effective_date: '2026-06-08'
      rate: 0.25
      sunset_date: '2027-12-31'
      post_sunset_annex: 'annex_1b'
      framework_floor_rate: 0.15
      framework_countries:
        - '3570'   # Argentina
        - '3310'   # Ecuador
        - '2110'   # El Salvador
        - '2050'   # Guatemala
        - '5880'   # Japan
        - '5800'   # South Korea
        - '4411'   # Liechtenstein
        - '4419'   # Switzerland
        - '5830'   # Taiwan
        - '4120'   # United Kingdom
        - 'eu'     # EU-27, expanded in the calculator
      usmca_steel:
        countries: ['1220', '2010']  # Canada, Mexico
        target_total: 0.15
        us_content_exempt_cap: 0.40  # statutory cap in Annex IV / U.S. note 16(j)
    annex_2:
      label: 'Removed from scope'
      rate: 0.0
    annex_3:
      label: 'Further downstream (temporary)'
      rate_type: 'floor'
      floor_rate: 0.15
      sunset_date: '2027-12-31'
      post_sunset_annex: 'annex_1b'
  # Exemptions: infrastructure only, aggregate_share = 0 disables until calibrated
  exemptions:
    us_origin_metal:
      rate: 0.10
      threshold: 0.85
      aggregate_share: 0.0
    de_minimis_weight:
      threshold: 0.15
      applies_to: ['annex_1b', 'annex_3']
      excludes_chapters: ['72', '73', '74', '76']
      aggregate_share: 0.0
    motorcycle_parts:
      applies_to: ['annex_1b']
      chapters: ['84', '85', '87']
      aggregate_share: 0.0
    zero_metal_content:
      # 9903.82.01 / Note 16(a): articles in subdivision (c) lists that
      # contain no aluminum, steel, or copper get "No change" — i.e., 0%
      # additional 232 duty. Models the fraction of imports under each
      # annex product that contain zero metal of the applicable type.
      # Calibration source: would need trade-flow data with metal-content
      # breakdowns (CBP entry-summary detail, industry surveys). Dormant
      # until calibrated; rate engine applies a no-op when share = 0.
      applies_to: ['annex_1a', 'annex_1b', 'annex_3']
      aggregate_share: 0.0
  # Country-specific surcharges preserved under the annex regime.
  # The April 2026 proclamation explicitly retains prior country-specific
  # S232 surcharges for Russian aluminum across Annex I-A, I-B, and III.
  # Annex II is out of scope (products removed from S232 entirely), so the
  # surcharge does not apply there.
  # Applied via pmax() so the surcharge wins over the annex tier rate.
  # metal_types scope: 'steel' (ch 72/73), 'aluminum' (ch 76), 'copper' (ch 74),
  # plus derivatives from resources/s232_derivative_products.csv filtered by
  # derivative_type. Expand by adding entries here — no code changes needed.
  country_surcharges:
    - countries: ['4621']                        # Russia
      rate: 2.0
      applies_to: ['annex_1a', 'annex_1b', 'annex_3']
      metal_types: ['aluminum']
      source: 'Proclamation 10522 (2023-02-24), retained by April 2026 proclamation'

