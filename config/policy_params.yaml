  resource_file: 'resources/s301_product_lists.csv'
  country: '5700'

# --- Section 232 derivative products ---
# Steel- and aluminum-containing articles outside primary chapters.
# Aluminum derivatives: US Note 19 subdivisions j/k/r/s → 9903.85.04/.07/.08
# Steel derivatives: US Note 16 subdivisions m/n/t/u → 9903.81.89-93
#   (added via Section 232 Inclusions Process, FR 2025-15819, effective Aug 18, 2025)
# Product list not extractable from HTS JSON; maintained in CSV with derivative_type
# and effective_date columns. Entries with effective_date are only applied to revisions
# on or after that date; entries with blank effective_date are always active.
section_232_derivatives:
  resource_file: 'resources/s232_derivative_products.csv'
  default_rate: 0.50    # fallback; actual rate extracted from ch99 entries
  aluminum_ch99_codes: ['9903.85.04', '9903.85.07', '9903.85.08']
  steel_ch99_codes: ['9903.81.89', '9903.81.90', '9903.81.91', '9903.81.93']

# --- Metal content shares for 232 derivatives ---
# The tariff on derivative products applies only to the metal content portion
# of customs value. Three methods for estimating metal share:
#   flat: uniform share for all derivatives (default 50%, matches TPC)
#   cbo:  product-level buckets from CBO files (high=0.75, low=0.25, copper=0.90)
#   bea:  sector-level shares from BEA I-O tables (future)
metal_content:
  method: 'bea'          # 'flat', 'cbo', or 'bea'
  flat_share: 0.50       # fallback for unmatched derivatives (all methods)
  primary_chapters: ['72', '73', '76']  # steel/aluminum chapters = 100% metal (ch74 excluded: copper heading needs copper_share for step 5b scaling)
  # CBO method (method: 'cbo') reads per-product buckets from resources/cbo/ and
  # uses hardcoded shares (high=0.75, low=0.25, copper=0.90) unless overridden via
  # cbo_high_share / cbo_low_share / cbo_copper_share keys here.
  # BEA method (method: 'bea', default) reads HS10-level shares from
  # resources/metal_content_shares_bea_hs10.csv. Matches Tariff-ETRs 'bea' detail method.

# --- Section 232 auto rebate and content share ---
# Reduces effective 232 rate on auto products by (rebate_rate * assembly_share).
# Reflects US assembly credit: domestic content offsets a fraction of the tariff.
#
# us_auto_content_share: scales USMCA exemption for 232 auto/MHD products.
# USMCA-eligible vehicles contain ~60% non-originating content under rules of origin;
# only the US/USMCA-origin share qualifies for exemption. Without this scaling,
# the tracker over-exempts CA/MX auto imports (~4.7pp gap vs Tariff-ETRs on ch87).
# Matches Tariff-ETRs parameter.
#
# REQUIRED: all three keys must be present. 06_calculate_rates.R step 4b errors
# if the block or any key is missing, rather than silently defaulting. To disable
# components explicitly, set values to 0 (rebate_rate, us_assembly_share) or 1
# (us_auto_content_share → full USMCA share applied).
auto_rebate:
  rebate_rate: 0.0375          # 3.75% rebate per Proclamation
  us_assembly_share: 0.33      # fraction of vehicle assembled in US
  us_auto_content_share: 0.40  # fraction of auto value that is US/USMCA-origin

# --- Section 232 civil-aircraft exemption (U.S. note 35) ---
# Note 35(c) / heading 9903.96.03 exempts Taiwan civil-aircraft components from the
# Section 232 metals annex (the additional duties of 9903.82.02 and 9903.82.04-9903.82.19),
# effective with 2026 HTS rev_9 (2026-05-28). Applied in 06_calculate_rates.R: rate_232 -> 0
# for the listed products of Taiwan, dropping them into the "without 232" stacking branch so
# the IEEPA reciprocal applies on full value (only the 232 metals duty is removed). Gated on
# heading 9903.96.03 being present in the revision's Ch99 data, so it self-dates to rev_9+.
# Parallel civil-aircraft product lists that were already parsed as floor exemptions
# are also applied as Section 232 metals-annex carve-outs in 06_calculate_rates.R.
# UK 9903.96.01 still needs a parsed resource/list before it can be safely modeled.
section_232_aircraft_exemption:
  enabled: true
  country: 'TW'
  products_file: 'resources/s232_aircraft_exempt_taiwan.csv'

# --- Section 232 auto-parts deal: subdivision (r) certification scope (EU/JP/KR) ---
# US Note 33(r) covers EU/JP/KR auto parts NOT in subdivision (g), NOT in chapters
# 72/73/76, NOT in Note 38(i) MHD parts, when the importer certifies the parts
# will be used for US auto production or repair. Headings 9903.94.44, 9903.94.45,
# 9903.94.54, 9903.94.55, 9903.94.64, 9903.94.65 cap such imports at a 15% floor
# and explicitly EXEMPT them from the April 2026 metals annex (9903.82.02 and
# 9903.82.04-9903.82.19).
#
# Without this block the post-annex tracker assigns annex_1b 25% to these parts
# for EU/JP/KR — over-stating both the rate (should be 15% floor for the certified
# share) and the metal-tariff stacking (should be excluded for the certified share).
#
# certified_share is the import-weighted fraction of EU/JP/KR imports of these
# products that are entered with the importer certification under .44-.65. It is
# uncalibrated; the 0.0 default leaves current behavior unchanged. Calibrate from
# CBP entry-summary data (heading 9903.94.45/.55/.65 line counts vs 9903.82.x
# line counts) or industry sources before turning on. See todo.md.
auto_parts_subdivision_r:
  products_file: 'resources/s232_subdivision_r_products.csv'
  applies_to_iso: ['EU', 'JP', 'KR']
  floor_rate: 0.15
  certified_share: 0.0   # uncalibrated; 0 = current behavior, no fix applied
  # FTA-exempt shares: fraction of EU/JP/KR subdivision (r) imports that qualify
  # under their respective FTA / executive-order regime and are therefore EXEMPT
  # from BOTH the 9903.94.44/.45/.54/.55/.64/.65 additional duty AND the metals
  # annex 9903.82.02/.04-.19 (per Note 33(r)(1) carve-out). For these imports
  # rate_232 = 0; only the underlying FTA-special tariff applies, captured via
  # base_rate elsewhere in the pipeline.
  #
  # Per Note 33(r) (rev_6 ch99 text line 35836-35837), the FTA exemption covers:
  #   - Goods qualifying under EO 14345 of September 4, 2025 (US-Japan Agreement)
  #   - Goods qualifying under the United States-Korea FTA (KORUS)
  # No equivalent FTA exists for EU goods in subdivision (r), so EU stays at 0.
  #
  # 2025 DataWeb signal (src/download_subdivision_r_share.R, ch87 imports):
  #   - SPI=KR utilization on subdiv-r products: 85.9% ($577M of $672M)
  #   - SPI=JP utilization on subdiv-r products: ~0% (US-Japan deal is not
  #     auto-scoped; importers don't claim SPI=JP on these HTS10s)
  # SPI utilization is an upper bound on fta_exempt_share since not all
  # SPI-claimed imports may also claim under .45/.55/.65; calibration TBD.
  fta_exempt_shares:
    EU: 0.0   # always 0; no EU-specific FTA covers subdivision (r)
    JP: 0.0   # uncalibrated; SPI=JP signal suggests near-zero in 2025
    KR: 0.0   # uncalibrated; SPI=KR signal suggests up to ~0.86 in 2025

# --- Fentanyl product carve-outs ---
# Product-specific fentanyl rate carve-outs for CA/MX.
# These entries in 9903.01.01-24 assign a lower rate to specific product
# categories instead of the general blanket rate:
#   9903.01.13 (CA): Energy, minerals, critical minerals → +10% (vs +35%)
#   9903.01.15 (CA): Potash → +10% (vs +35%)
#   9903.01.05 (MX): Potash → +10% (vs +25%)
# Product lists sourced from Tariff-ETRs config (US Note 2 subdivisions).
fentanyl_carveouts:
  resource_file: 'resources/fentanyl_carveout_products.csv'

# --- Countries excluded from TPC validation ---
# These countries have legitimate IEEPA entries in the HTS JSON, but TPC
# doesn't model them. Excluded from validation comparisons to avoid
# false-positive discrepancies (~95K product-country pairs).
tpc_excluded_countries:
  - '5020'   # Syria
  - '4641'   # Moldova
  - '5530'   # Laos
  - '3720'   # Falkland Islands
  - '7660'   # DR Congo

# --- USMCA utilization shares ---
# Product-level USMCA utilization rates from USITC DataWeb (SPI S/S+).
# mode: 'since' (BASELINE): value-weighted average of every monthly file from a
#           FIXED start (start_year/start_month) through the most recent month
#           present on disk. Open right edge — new months fold in automatically
#           with no config change. Baseline window: 2025-07 .. latest (2026-02 as
#           of this writing) — the same July left edge as h2_average. Spans the
#           year boundary, so it keeps the 2025 sample size while tracking the
#           freshest 2026 claiming behavior. Time-invariant across revisions.
#        'h2_average': averages months 7-12 of configured year. Post-tariff
#           steady-state without monthly noise; the prior baseline (2025 H2).
#        'annual' loads resources/usmca_product_shares_{year}.csv (single file for all revisions)
#        'monthly' loads resources/usmca_product_shares_{year}_{MM}.csv per revision effective month
#        'fixed_month' loads resources/usmca_product_shares_{year}_{MM}.csv using configured month
#        'hybrid_rolling': Q1 average for Jan-Mar, 3-month rolling avg from April.
# month: (optional) which month to use for 'fixed_month' mode (1-12, default 12)
# start_year/start_month: (since mode) fixed left edge of the averaging window.
# year-specific annual files: 2024 (pre-tariff steady-state, CA ~38%, MX ~50%)
#                              2025 (tariff-induced jump, CA ~67%, MX ~68%)
# Monthly files: generated by download_usmca_dataweb.R --monthly --year {year}
usmca_shares:
  mode: 'since'             # 'since', 'h2_average', 'annual', 'monthly', 'fixed_month', 'hybrid_rolling'
  year: 2025                # used by annual/h2_average fallbacks
  start_year: 2025          # since: window starts 2025-07 (same July edge as h2_average) ...
  start_month: 7            # ... and runs through the most recent available month

# --- MFN exemption shares (FTA/GSP preference utilization) ---
# Adjusts statutory MFN base_rate down using Census calculated duty data.
# effective_mfn = mfn_rate * (1 - exemption_share) at HS2 x country level.
# method: 'none' (statutory rates), 'hs2' (Tariff-ETRs shares)
# exclude_usmca_countries: skip CA/MX (USMCA product shares handle them at HTS10 level)
mfn_exemption:
  method: 'hs2'
  exclude_usmca_countries: true

# --- IEEPA reciprocal: duty-free product treatment ---
# Whether to apply IEEPA reciprocal tariffs to products with 0% MFN base rate.
# Legal text supports either interpretation. Sensitivity toggle, not a TPC match:
# TPC uses product-specific legal exemptions (Berman Amendment for ch49/ch97,
# Annex II for electronics, country-specific generic pharma shares, Ch98 statutory),
# not a blanket duty-free exclusion. This toggle partially overlaps with those
# but is not equivalent.
#   'all' = apply to all products (current default, legally strict)
#   'nonzero_base_only' = skip duty-free products (sensitivity analysis)
ieepa_duty_free_treatment: 'all'

# --- IEEPA Annex II / Annex A exempt-list scope ---
# Controls which IEEPA tariff layers the universal exempt list
# (resources/ieepa_exempt_products.csv, ~4,326 HTS10s built from Annex II,
# US Note 2(v)(iii), ITA prefixes, Berman ch49/ch97, Ch98) zeros out.
#
# Country-specific EO surcharges (Brazil 9903.01.77, India 9903.01.84, etc.)
# use the SEPARATE per-EO list (resources/country_eo_exempt_products.csv),
# plus Annex II inheritance for EOs in country_eo_annex_ii_inherit (below)
# and the standard ch98 claim exemption — regardless of this setting.
#
#   'all' — applies to universal baseline (9903.01.25, +10%), Phase 1
#           surcharges (9903.01.43-.75, when active), Phase 2 surcharges
#           (9903.02.xx country-specific), AND the 15% floor structure for
#           EU/JP/KR/CHE/LIE. Current default. Aligns with EO text and
#           Tariff-ETRs methodology — see legal-scope analysis below.
#
#   'baseline_only' — applies ONLY to the universal IEEPA baseline (9903.01.25).
#           Country-specific Phase 1, Phase 2, and floor structures are NOT
#           subject to the universal exempt list. DIAGNOSTIC ONLY.
#
# WARNING: 'baseline_only' produces legally-incorrect output. Annex II of
# EO 14257 (as amended by EO 14326 of Jul 31, 2025 and EO 14346 of Sep 5, 2025)
# applies uniformly to all IEEPA reciprocal authorities — universal baseline,
# Phase 1, Phase 2 country-specific, and the 15% floor for EU/JP/KR/CHE/LIE.
# The exemption is claimed via HTSUS 9903.01.32 against any of these layers.
# There is no separate Phase 2 exemption list; CBP CSMS #65829726 and
# EO 14326 §3 preserve EO 14257 exceptions across the Phase 2 reinstatement.
# Tariff-ETRs uses the same 'all'-equivalent scope.
#
# 'baseline_only' exists ONLY to bound the magnitude of importer 9903.01.32
# non-claim behavior — i.e., legally-eligible imports that filed under a
# Ch99 dutiable code and paid duty rather than claiming the exemption. The
# delta between 'all' and 'baseline_only' rebuilds is an upper bound on the
# tracker-attributable share of the trackermiss gap; the residual against
# Census is the importer non-claim channel. Do NOT use in production.
ieepa_exempt_scope: 'all'

# --- Country-EO Annex II inheritance ---
# Country EOs whose US-note subdivision exempts the FULL universal Annex II
# list (note 2(v)(iii)), in addition to any entries on the per-EO list.
# India: note 2(z)(ii) — "As provided in heading 9903.01.86, the additional
# duties imposed by heading 9903.01.84 shall not apply to articles the product
# of India classified in the provisions of the HTSUS listed in subdivision
# (v)(iii) of note 2." (Confirmed in chapter99_2026_rev_6.txt line ~14735;
# resolves India pharma 3004 charged 25% vs ~0 collected — extreme-eta review
# item 2.) Brazil 9903.01.77 deliberately NOT listed: its exemptions are its
# own enumerated list per note 2(x)(iii)(a) (country_eo_exempt_products.csv).
# Chapter 98 claims are exempt from ALL country EOs via the standard ch98
# paragraph in each EO's note — handled in code, not per-EO config.
country_eo_annex_ii_inherit: ['9903.01.84']

# --- IEEPA invalidation (SCOTUS ruling) ---
# Date when IEEPA tariff authority was invalidated by the Supreme Court.
# All revisions with effective_date >= this date have IEEPA rates zeroed out.
# Set to null to disable (all revisions keep IEEPA rates as parsed).
ieepa_invalidation_date: '2026-02-24'       # HTS/CBP implementation date; overridden to 2026-02-20 when use_policy_dates=TRUE
ieepa_invalidation_policy_date: '2026-02-20' # SCOTUS ruling date (Learning Resources v. Trump)

# --- Section 122 (Trade Act §122, 150-day statutory limit) ---
# Blanket tariff replacing IEEPA after SCOTUS invalidation.
# Effective 2026-02-24; expires after 150 days unless Congress extends.
# Set finalized to true if Congress extends (removes expiry constraint).
section_122:
  effective_date: '2026-02-24'           # HTS/CBP implementation date
  policy_effective_date: '2026-02-24'    # Aligned with HTS effective date (no policy-date override)
  expiry_date: '2026-07-23'             # 150 days from HTS effective (last active day)
  policy_expiry_date: '2026-07-23'      # Aligned with HTS expiry date
  finalized: false              # set true if Congress extends
  rate: 0.10                    # 10% non-discriminatory rate (from 9903.03.01)
  exempt_products: 'resources/s122_exempt_products.csv'

# --- Series time horizon ---
# End date for timeseries valid_until on the final revision.
# Controls how far forward daily series, ETR queries, and exports extend.
# The last observed HTS revision is assumed to remain in force through this date,
# subject to date-bounded policy overrides (Section 122 expiry, Swiss framework).
series_horizon:
  end_date: '2026-12-31'

# --- Future tariff activations ("turn-ON" dates) ---
# Tariffs that are announced / legally effective on a FUTURE date but do not yet
# appear in any HTS archive (the mirror of the section_122 sunset, which turns a
# rate OFF on a future date) are handled by DATE-GATING in the calculator plus a
# boundary_overrides mint (below). Example: pharma §232 (Sept 29) is date-gated in
# extract_section232_rates (section_232_headings.pharmaceuticals.effective_date) and
# materialized via boundary_overrides, so it fires on every revision >= 2026-09-29
# INCLUDING the empty-ops boundary mints — no synthetic-revision verb step needed.

# --- Boundary-mint overrides (unified timeline / P2-1) ---
# Curated backstop list of effective dates to mint as synthetic `bnd_<date>`
# revisions, on TOP of the dates discover_boundaries() finds automatically (Ch99
# effective_date_offsets, IEEPA invalidation, §232 country-exemption expiries).
# Use ONLY for a legal effective date that falls strictly inside a real revision
# interval, has NO coincident Ch99 offset / config date the scan already catches,
# AND that the calculator's own date gates re-resolve as-of that date (so a pure
# as-of recompute reproduces the change — no new operations).
#
# The three in-grid boundaries (2025-03-12 §232 metal-exemption expiry, 2026-02-20
# IEEPA invalidation, 2026-11-10 §301 cranes/chassis turn-on) are auto-discovered.
# 2026-09-29 is the pharma §232 turn-on: it has no Ch99 offset (config-driven), so the
# scan can't see it, but the calc's pharma date-gate re-resolves it as-of that date —
# exactly the "config date the scan can't see" case this backstop is for.
boundary_overrides: ['2026-06-08', '2026-09-29']

# --- Validation thresholds ---
validation_thresholds:
  exact: 0.005
  within_2pp: 0.02
  within_5pp: 0.05
