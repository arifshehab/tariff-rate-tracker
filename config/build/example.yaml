# Build-run config — the SINGLE input to the build.
#   SCENARIO build:  bash scripts/submit_build_array.sh --config config/build/example.yaml
#
# Produces ONE timestamped vintage under model_data_root containing the `actual`
# series plus a subfolder per scenario listed below:
#   <model_data_root>/<vintage>/{actual, scenarios/forced_labor, scenarios/new_301}/...
# Nothing is written into the repository working tree (staging is external + cleaned).

# Output interface root. Omit to inherit config/local_paths.yaml:model_data_root.
model_data_root: /nfs/roberts/project/pi_nrs36/shared/model_data/Tariff-Rate-Tracker

# External scratch base for intermediate snapshots/parts. Omit -> <model_data_root>/.staging.
# A per-run subdir <staging_root>/<vintage>/ is created, published from, and removed.
staging_root: null

# Baseline policy params (current law). Scenario overlays deep-merge onto this.
policy_params_path: config/policy_params.yaml

# Scenarios to build alongside `actual` (each maps to config/scenarios/<name>/overlay.yaml).
# `actual` is ALWAYS built; do not list it here. Empty list = actual only.
scenarios:
  - forced_labor
  - new_301

# Flags
use_hts_dates: false        # false -> policy effective dates (default)
weight_mode: required       # required | unweighted
update_latest: true         # repoint <model_data_root>/latest at this vintage
allow_partial: false        # false -> fail loud if any expected revision snapshot is missing
