baseline:
  description: 'All current tariffs active'
  disable: []

no_ieepa:
  description: 'Remove all IEEPA tariffs (reciprocal + fentanyl)'
  disable: [ieepa_reciprocal, ieepa_fentanyl]

no_ieepa_recip:
  description: 'Remove IEEPA reciprocal only (keep fentanyl)'
  disable: [ieepa_reciprocal]

no_301:
  description: 'Remove Section 301 (China trade)'
  disable: [section_301]

no_232:
  description: 'Remove Section 232 (steel/aluminum)'
  disable: [section_232]

no_s122:
  description: 'Remove Section 122 tariffs'
  disable: [section_122]

pre_2025:
  description: 'Only pre-2025 tariffs (232 + legacy 301)'
  disable: [ieepa_reciprocal, ieepa_fentanyl, section_122]

eu_auto_25pct:
  description: 'EU 232+MFN auto floor raised from 15% to 25% on 2026-05-04'
  patches:
    - filter:
        country_group: eu
        product_set: auto_vehicles
        from_date: '2026-05-04'
      action:
        type: floor
        column: rate_232
        value: 0.25
