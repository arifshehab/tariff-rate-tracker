# Scenario: forced_labor_0801
# =============================================================================
# Variant of the `forced_labor` scenario with the turn-on shifted from
# 2026-07-24 to 2026-08-01. Identical in every other respect.
#
# USTR Section 301 "Forced Labor" action (FRN 91 FR 34272, published 2026-06-05):
# additional ad-valorem duty on ALL products of 60 economies except an Annex A
# exclusion list, at two tiers — 10% and 12.5%. Here it turns ON 2026-08-01
# (a week later than the canonical forced_labor scenario). s122's 10% blanket
# already expired 2026-07-23, so there is a one-week (07-24..07-31) gap with no
# blanket before forced labor begins.
#
# Run:  build with TARIFF_SCENARIO=forced_labor_0801 (or the streaming driver) ->
#       data/timeseries/forced_labor_0801/. Inherits everything baseline has.
# =============================================================================

section_301_forced_labor:
  effective_date: '2026-08-01'            # shifted from 2026-07-24
  rate_10: 0.10
  rate_12_5: 0.125
  exempt_products: 'resources/s301fl_exempt_products.csv'
  # 10% tier — 14 economies (EU expanded to its 27 member census codes; Taiwan,
  # Canada, Mexico, UK individual). Census codes.
  tier_10pct: ['1220', '2010', '2050', '2110', '3310', '3570', '4010', '4050',
               '4099', '4120', '4190', '4210', '4231', '4239', '4279', '4280',
               '4330', '4351', '4359', '4370', '4470', '4490', '4510', '4550',
               '4700', '4710', '4730', '4759', '4791', '4792', '4840', '4850',
               '4870', '4910', '5350', '5380', '5550', '5570', '5600', '5830']
  # 12.5% tier — the other 46 economies (incl. 5700 China, 5820 Hong Kong,
  # 5520 Vietnam, 5800 South Korea, 5880 Japan, 5330 India, 3510 Brazil, ...).
  tier_12_5pct: ['2150', '2190', '2230', '2360', '2470', '2740', '3010', '3070',
                 '3120', '3330', '3370', '3510', '3550', '4039', '4419', '4621',
                 '4634', '4890', '5050', '5081', '5110', '5130', '5170', '5180',
                 '5200', '5230', '5250', '5330', '5420', '5490', '5520', '5590',
                 '5650', '5700', '5800', '5820', '5880', '6021', '6141', '7140',
                 '7210', '7250', '7290', '7530', '7620', '7910']

# Mint the 2026-08-01 turn-on as a synthetic boundary revision. deep-merge
# REPLACES a list wholesale, so re-list baseline's overrides too: 2026-06-08
# (§232 metals Annex I-C/III, Proc. 11032) and 2026-09-29 (pharma §232 turn-on).
# 2026-08-01 is the forced-labor turn-on (was 2026-07-24 in forced_labor).
boundary_overrides: ['2026-06-08', '2026-08-01', '2026-09-29']
